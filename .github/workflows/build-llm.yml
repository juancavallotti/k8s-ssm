name: Build & Push LLM image

# Builds the LLM Docker image on a native linux/amd64 GitHub runner (no QEMU emulation).
# This is required because cartesia-pytorch compiles CUDA C++ extensions (mamba-ssm,
# flash-attn, causal-conv1d) that segfault when compiled under QEMU on Apple Silicon.
#
# Required GitHub secrets:
#   AWS_ACCESS_KEY_ID      - IAM key with ECR push + EKS describe permissions
#   AWS_SECRET_ACCESS_KEY  - corresponding secret key
#
# Optional secrets / variables:
#   AWS_REGION    (default: us-west-2)
#   CLUSTER_NAME  (default: k8s-ssm)

on:
  push:
    branches: [main]
    paths:
      - "services/llm/**"
      - ".github/workflows/build-llm.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Rollout restart after push? (true/false)"
        required: false
        default: "true"

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
  CLUSTER_NAME: ${{ vars.CLUSTER_NAME || 'k8s-ssm' }}

jobs:
  build-push:
    name: Build and push LLM image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR base URL
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "base=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> "$GITHUB_OUTPUT"

      - name: Log in to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ steps.ecr.outputs.base }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names llm \
            --region ${{ env.AWS_REGION }} 2>/dev/null || \
          aws ecr create-repository \
            --repository-name llm \
            --region ${{ env.AWS_REGION }}

      # Runs on ubuntu-latest (native x86_64) — no QEMU, CUDA extensions compile correctly.
      - name: Build LLM image
        run: docker build --platform linux/amd64 -t llm services/llm/

      - name: Push to ECR
        run: |
          docker tag llm:latest ${{ steps.ecr.outputs.base }}/llm:latest
          docker push ${{ steps.ecr.outputs.base }}/llm:latest

      - name: Rollout restart LLM deployment
        if: ${{ github.event_name == 'push' || github.event.inputs.deploy == 'true' }}
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}
          kubectl rollout restart deployment/llm-service -n chatbot
          kubectl rollout status deployment/llm-service -n chatbot --timeout=300s
